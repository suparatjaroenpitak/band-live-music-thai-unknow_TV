services:
  smart-music-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: smart-music-studio:latest
    container_name: smart-music-studio
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
